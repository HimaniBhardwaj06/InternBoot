{% extends 'base.html' %}


{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">


                <h2 class="text-center mb-4">
                    ✍️ Create New Blog
                </h2>


                <form method="POST">

                    {% csrf_token %}


                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Title
                        </label>

                        {{ form.title }}

                    </div>



                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Content
                        </label>

                        {{ form.content }}

                    </div>



                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Category
                        </label>

                        {{ form.category }}

                    </div>



                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Tags
                        </label>

                        {{ form.tags }}

                    </div>



                    <div class="text-center">

                        <button class="btn btn-primary px-5 py-2 rounded-pill">

                            🚀 Publish Blog

                        </button>

                    </div>


                </form>


            </div>

        </div>


    </div>

</div>


{% endblock %}
