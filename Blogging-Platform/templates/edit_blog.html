{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">

                    ✏️ Edit Blog

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Title
                        </label>

                        {{ form.title }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Category
                        </label>

                        {{ form.category }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Tags
                        </label>

                        {{ form.tags }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Content
                        </label>

                        {{ form.content }}

                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{% url 'blog_detail' blog.id %}"
                           class="btn btn-secondary rounded-pill px-4">

                            Cancel

                        </a>

                        <button
                            type="submit"
                            class="btn btn-success rounded-pill px-5">

                            💾 Save Changes

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
